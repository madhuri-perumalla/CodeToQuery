services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: codetoquery-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codetoquery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-codetoquery}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codetoquery}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codetoquery-network

  # Redis (for Celery)
  redis:
    image: redis:7-alpine
    container_name: codetoquery-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codetoquery-network

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: codetoquery-backend
    env_file:
      - ../backend/.env
    environment:
      - APP_NAME=${APP_NAME:-CodeToQuery}
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codetoquery}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-codetoquery}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - codetoquery-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (for background tasks)
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: codetoquery-celery-worker
    env_file:
      - ../backend/.env
    environment:
      - APP_NAME=${APP_NAME:-CodeToQuery}
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codetoquery}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-codetoquery}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - codetoquery-network
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: codetoquery-celery-beat
    env_file:
      - ../backend/.env
    environment:
      - APP_NAME=${APP_NAME:-CodeToQuery}
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codetoquery}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-codetoquery}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - codetoquery-network
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: codetoquery-frontend
    env_file:
      - ../frontend/.env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://backend:8000/api/v1}
      - VITE_APP_TITLE=${VITE_APP_TITLE:-CodeToQuery}
      - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - codetoquery-network

volumes:
  postgres_data:
  redis_data:

networks:
  codetoquery-network:
    driver: bridge
